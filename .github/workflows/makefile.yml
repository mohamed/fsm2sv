name: Makefile CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Install dependencies
      run: |
        sudo apt install verilator graphviz

    - name: Python linting
      run: make pylint

    - name: Run tests
      run: make setup test sim

    - name: Install pandoc and typst
      run: |
        sudo apt install pandoc fonts-liberation
        curl -fsSL https://github.com/typst/typst/releases/latest/download/typst-x86_64-unknown-linux-musl.tar.xz \
          | sudo tar -xJ --strip-components=1 -C /usr/local/bin typst-x86_64-unknown-linux-musl/typst

    - name: Generate PDF documentation
      run: make docs
